# Render Blueprint — one-click deploy for the Go API
# Dashboard: New → Blueprint → connect this repo
# After deploy, set secret env vars in the Render dashboard.

services:
  - type: web
    name: govim-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: info
      - key: STORAGE_PROVIDER
        value: local
      - key: STORAGE_PATH
        value: /tmp/vimtrainer-uploads
