version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vimtrainer
      POSTGRES_USER: vimtrainer
      POSTGRES_PASSWORD: vimtrainer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vimtrainer -d vimtrainer"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://vimtrainer:vimtrainer@postgres:5432/vimtrainer?sslmode=disable
      JWT_SECRET: dev-secret-must-be-at-least-32-characters-long
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      PORT: "8080"
      ENVIRONMENT: development
      LOG_LEVEL: debug
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
